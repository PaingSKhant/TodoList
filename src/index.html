<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="menu">
        <button id="addProject"><span>+</span> Add Project</button>
        <div id="projectsContainer">
            <div id="defaultProject" class="projectName">Home</div>
        </div>
    </div>
    <div id="mainScreen">
        <div id="titleAndAddTask">
            <h1 id="projectTitle">Title</h1>
            <button id="addTask"><span>+</span>Add Task</button>
        </div>
        <div id="modal" style="display: none;">
            <div id="modalHeader">
                <h3>New Todo</h4>
                <button id="closeModal">&times;</button>
            </div>

            <div id="formSection">
                <form id="form">

                    <label for="name">Title</label>
                    <input type="text" id="name" placeholder="Task Title">

                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="Task Description">

                    <label for="fDate">Date</label>
                    <input type="date" id="fDate">

                    <label for="priority">Priority</label>
                    <select id="priority">
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low" selected>Low</option>
                    </select>

                    <span id="fsubmit"><input id="fsubmit" type="submit"></span>
                    
                </form>
            </div>
            
        </div>

        <div id="tasksContainer"></div>
        
    </div>

    
</body>
</html>
